// t_sync.proto
// T-Sync Incremental ZIP Backup Standard — v2
//
// Defines the top-level BackupMetadata message: the single serialized blob
// that fully describes a T-Sync backup store. A conforming implementation
// must be able to reconstruct any versioned ZIP archive solely from this
// metadata plus the corresponding encrypted file-part objects (one per unique
// content blob) stored in the object store.
//
// Wire format: proto3 binary. The file extension is ".tsync".
//
// Compatibility promise:
//   Within v2, field numbers and types are frozen. New optional fields may be
//   added (patch/minor bumps). Removals or type changes require a v3 package.
//   See docs/compatibility.md for the full policy.

syntax = "proto3";

package com.github.abyii.tsync.v2;

import "com/github/abyii/tsync/v2/metadata.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/abyii/tsync/gen/go/v2;tsyncv2";

// ---------------------------------------------------------------------------
// BackupMetadata — root message, the single serialized ".tsync" file.
//
// Contains three independent stores that together fully describe the backup:
//
//   versions  — the history of snapshots. Each Version points to a root tree.
//   trees     — content-addressed directory nodes, shared across versions.
//   files     — content-addressed file encryption records, shared across versions.
//
// To reconstruct version V:
//   1. Look up V in versions by snowflake_id.
//   2. Look up V.root_tree_hash in trees to get the root TreeNode.
//   3. Walk the tree recursively, resolving subtree_hash entries in trees.
//   4. At each FileLeaf, derive the compound key and look up in files.
//   5. Decrypt the ZIP password from the FileRecord and reconstruct the file.
// ---------------------------------------------------------------------------
message BackupMetadata {

  // All backup versions, keyed by snowflake_id as a decimal string.
  // proto3 map keys must be strings or integers; decimal string is used for
  // human-readability in JSON transcoding.
  map<string, com.github.abyii.tsync.v2.Version> versions = 1;

  // Content-addressed directory nodes, keyed by SHA-256 hash of each
  // TreeNode's canonical serialized bytes (64-char lowercase hex string).
  //
  // TreeNodes are shared structurally across versions: two versions whose
  // /src/ directory is identical reference the same TreeNode hash, which
  // is stored here exactly once. Only changed subtrees produce new entries
  // on each backup run.
  //
  // GC: a TreeNode may be removed only when no live Version's tree
  // (transitively) references its hash.
  map<string, com.github.abyii.tsync.v2.TreeNode> trees = 2;

  // Content-addressable file records, keyed by compound content key:
  //   "{8-char-crc32-hex}_{uncompressed_size_decimal}"
  //   e.g. "a1b2c3d4_102400"
  //
  // CRC-32 is the standard checksum present in every ZIP Data Descriptor and
  // Central Directory — no special extra fields required. The uncompressed_size
  // component guards against the low but non-zero CRC-32 collision probability.
  //
  // One entry per unique content blob across all versions. Entries are
  // deduplicated: the same file content appearing in multiple versions or paths
  // produces one FileRecord, referenced by many FileLeaf nodes in the trees.
  //
  // GC: a FileRecord may be removed only when no live TreeNode leaf
  // (transitively reachable from any Version) references its compound key.
  map<string, com.github.abyii.tsync.v2.FileRecord> files = 3;

  // VM long-lived Curve25519 public keys, keyed by key_id.
  // Values are raw 32-byte Curve25519 public keys as used by NaCl/libsodium
  // (not SPKI-wrapped — the raw bytes from nacl.public.PublicKey).
  //
  // Optional — only needed if FileRecord.key_id is used (e.g. for key
  // rotation). If a single permanent VM keypair is used, this may be empty
  // and the public key managed out-of-band.
  map<string, bytes> public_keys = 4;

  // Schema version of this file. Always 2 for messages in this package.
  // Writers must set this. Readers must reject files with an unrecognised
  // schema_version rather than silently misinterpreting them.
  uint32 schema_version = 5;

  // Optional. Human-readable label for this backup store
  // (e.g. "my-project-backup"). Not used during reconstruction.
  optional string store_label = 6;

  // Timestamp of the last write to this metadata file.
  google.protobuf.Timestamp last_updated = 7;
}
